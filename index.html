<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Algoritmo de Asignación de Memoria</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }

    
/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.header img { width:120px; }

.header-text h2 { margin:0; color:#2c3e50; }
.header-text p { margin:2px 0; font-size:14px; }

/* BOX */
.box {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

/* 🔥 INPUTS MÁS GRANDES */
input {
    padding:8px;
    margin:5px;
    width:90%;
    max-width:600px;
}

select, button {
    padding:8px;
    margin:5px;
}

/* GANTT */
.gantt {
    display:flex;
    width:100%;
    margin-top:20px;
    border:2px solid #333;
}

.segmento {
    display:flex;
    flex-direction:column;
    border-right:1px solid #000;
    min-height:80px;
}

.proceso { background:#3498db; color:white; }
.fragmento { background:#e74c3c; color:white; }
.libre { background:#2ecc71; color:white; }

.proceso, .fragmento, .libre {
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.dir {
    font-size:10px;
    text-align:center;
    margin-top:3px;
}

.resultado {
    margin-top:15px;
    background:#ecf0f1;
    padding:10px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
    <img src="Logo_unca.png">
    <div class="header-text">
        <h2>Cátedra Sistemas Operativos</h2>
        <p>Facultad de Tecnología y Ciencias Aplicadas</p>
        <p>Docente: Mgtr. Manuel Baquinzay</p>
    </div>
</div>

<h3>Simulador de Algoritmos de Asignación de Memoria</h3>

<div class="box">

<label>Bloques:</label><br>
<input type="text" id="bloques"><br>

<label>Procesos (A:100,B:50):</label><br>
<input type="text" id="procesos"><br>

<label>Algoritmo:</label><br>
<select id="algoritmo">
    <option value="first">First Fit</option>
    <option value="best">Best Fit</option>
    <option value="worst">Worst Fit</option>
    <option value="next">Next Fit</option>
</select><br>

<button onclick="simular()">Simular</button>
<button onclick="resetear()">Resetear</button>
<button onclick="ejemplo()">Ejemplo</button>

</div>

<div class="resultado" id="salida"></div>
<div class="gantt" id="memoria"></div>

<script>

function parseBloques() {
    return document.getElementById("bloques").value
        .split(",")
        .map(x => parseInt(x.trim()))
        .filter(x => !isNaN(x));
}

function parseProcesos() {
    return document.getElementById("procesos").value
        .split(",")
        .map(x => {
            let [n,t] = x.split(":");
            return { nombre:n.trim(), tam:parseInt(t) };
        })
        .filter(x => x.nombre && !isNaN(x.tam));
}

function simular() {

    let bloques = parseBloques();
    let procesos = parseProcesos();
    let algoritmo = document.getElementById("algoritmo").value;

    if (bloques.length === 0 || procesos.length === 0) {
        alert("Ingresá datos correctamente");
        return;
    }

    let libres = [...bloques];
    let asignaciones = new Array(bloques.length).fill(null);
    let usado = new Array(bloques.length).fill(false);

    let pos = 0;
    let resultado = "";

    procesos.forEach(p => {

        let idx = -1;

        if (algoritmo === "first") {
            for (let i=0;i<libres.length;i++)
                if (!usado[i] && libres[i] >= p.tam) { idx = i; break; }
        }

        if (algoritmo === "best") {
            let best = -1;
            for (let i=0;i<libres.length;i++)
                if (!usado[i] && libres[i] >= p.tam)
                    if (best === -1 || libres[i] < libres[best]) best = i;
            idx = best;
        }

        if (algoritmo === "worst") {
            let worst = -1;
            for (let i=0;i<libres.length;i++)
                if (!usado[i] && libres[i] >= p.tam)
                    if (worst === -1 || libres[i] > libres[worst]) worst = i;
            idx = worst;
        }

        if (algoritmo === "next") {
            let count = 0;
            while (count < libres.length) {
                if (!usado[pos] && libres[pos] >= p.tam) { idx = pos; break; }
                pos = (pos + 1) % libres.length;
                count++;
            }
        }

        if (idx !== -1) {
            asignaciones[idx] = p;
            usado[idx] = true;
            libres[idx] -= p.tam;

            resultado += `✔ Proceso ${p.nombre} (${p.tam}) → Bloque ${idx}<br>`;
        } else {
            resultado += `❌ Proceso ${p.nombre} (${p.tam}) → No se puede ejecutar: no existe un bloque libre adecuado<br>`;
        }
    });

    let memoriaLibre = libres.reduce((a,b)=>a+b,0);
    resultado += `<br><b>Memoria libre total:</b> ${memoriaLibre}`;

    document.getElementById("salida").innerHTML = resultado;

    let cont = document.getElementById("memoria");
    cont.innerHTML = "";

    let totalMem = bloques.reduce((a,b)=>a+b,0);
    let base = 0;

    bloques.forEach((tam,i)=>{

        let seg = document.createElement("div");
        seg.className = "segmento";
        seg.style.width = (tam / totalMem * 100) + "%";

        if (asignaciones[i]) {

            let proc = asignaciones[i];

            let pDiv = document.createElement("div");
            pDiv.className = "proceso";
            pDiv.style.flex = proc.tam;
            pDiv.innerHTML = proc.nombre + " ("+proc.tam+")";

            seg.appendChild(pDiv);

            let fi = libres[i];

            if (fi > 0) {
                let fDiv = document.createElement("div");
                fDiv.className = "fragmento";
                fDiv.style.flex = fi;
                fDiv.innerHTML = "FI " + fi;
                seg.appendChild(fDiv);
            }

        } else {
            let libreDiv = document.createElement("div");
            libreDiv.className = "libre";
            libreDiv.innerHTML = "Libre ("+tam+")";
            seg.appendChild(libreDiv);
        }

        let dir = document.createElement("div");
        dir.className = "dir";
        dir.innerText = base + " - " + (base+tam);

        seg.appendChild(dir);
        cont.appendChild(seg);

        base += tam;
    });
}

function resetear() {
    document.getElementById("bloques").value = "";
    document.getElementById("procesos").value = "";
    document.getElementById("salida").innerHTML = "";
    document.getElementById("memoria").innerHTML = "";
}

function ejemplo() {
    document.getElementById("bloques").value = "600,100,50,150,300,60";
    document.getElementById("procesos").value = "AUTH:200,DB:135,CACHE:30,API:170";
}

</script>

</body>
</html>
